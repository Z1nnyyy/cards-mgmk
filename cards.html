<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карточки знаний</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card-bg: #1a1a1a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f0e6cc;
    --text: #e8e0d0;
    --text-muted: #9a8f7a;
    --accent: #8b3a3a;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    z-index: 1;
  }

  .header-label {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 600;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #a07830 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  header p {
    color: var(--text-muted);
    font-size: 15px;
    letter-spacing: 0.05em;
    font-weight: 300;
  }

  .header-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto 0;
  }

  /* Grid layout */
  .grid-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 24px 80px;
    position: relative;
    z-index: 1;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  /* Number selector cards */
  .card-wrapper {
    perspective: 1200px;
  }

  .card-selector {
    background: var(--card-bg);
    border: 1px solid #2a2a2a;
    border-radius: var(--radius);
    padding: 0;
    cursor: pointer;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    overflow: hidden;
    position: relative;
  }

  .card-selector::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 0;
  }

  .card-selector:hover {
    transform: translateY(-6px);
    border-color: var(--gold);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(201,168,76,0.15);
  }

  .card-selector:hover::before { opacity: 1; }

  .card-selector.active {
    border-color: var(--gold-light);
    box-shadow: 0 0 0 2px var(--gold), 0 20px 60px rgba(0,0,0,0.6);
  }

  .card-number-face {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  .card-ordinal {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    font-weight: 600;
  }

  .card-big-number {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    opacity: 0.15;
    transition: opacity 0.3s;
  }

  .card-selector:hover .card-big-number,
  .card-selector.active .card-big-number {
    opacity: 0.6;
  }

  .card-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 14px;
    letter-spacing: 0.15em;
    font-weight: 300;
    text-transform: uppercase;
  }

  .card-corner-decor {
    position: absolute;
    top: 12px; right: 14px;
    width: 20px; height: 20px;
    border-top: 1px solid var(--gold);
    border-right: 1px solid var(--gold);
    opacity: 0.4;
    border-radius: 0 4px 0 0;
  }
  .card-corner-decor-bl {
    position: absolute;
    bottom: 12px; left: 14px;
    width: 20px; height: 20px;
    border-bottom: 1px solid var(--gold);
    border-left: 1px solid var(--gold);
    opacity: 0.4;
    border-radius: 0 0 0 4px;
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    padding: 20px;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  /* Flip card in modal */
  .flip-card {
    perspective: 1400px;
    width: min(480px, 100%);
    height: min(620px, 80vh);
  }

  .flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1.000);
  }

  .flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
  }

  .flip-front, .flip-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.7);
  }

  /* Front face - image */
  .flip-front {
    background: var(--card-bg);
    border: 1px solid #333;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    cursor: pointer;
  }

  .front-image-area {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .front-image-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.7;
    transition: opacity 0.3s, transform 0.5s;
  }

  .flip-front:hover .front-image-area img {
    opacity: 0.85;
    transform: scale(1.03);
  }

  .front-gradient {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(to top, rgba(10,10,10,0.95) 0%, transparent 100%);
    z-index: 1;
  }

  .front-top-badge {
    position: absolute;
    top: 20px; left: 20px;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge-number {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(201,168,76,0.4);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.1em;
  }

  .front-bottom {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 24px;
    text-align: center;
  }

  .front-category {
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .front-flip-hint {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
  }

  .front-flip-hint:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .flip-icon {
    font-size: 16px;
    display: inline-block;
    transition: transform 0.3s;
  }

  .front-flip-hint:hover .flip-icon {
    transform: rotate(180deg);
  }

  /* Back face */
  .flip-back {
    background: linear-gradient(145deg, #1c1710 0%, #1a1108 50%, #0d0d0d 100%);
    border: 1px solid rgba(201,168,76,0.3);
    transform: rotateY(180deg);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .back-header {
    padding: 28px 28px 16px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    flex-shrink: 0;
  }

  .back-number-label {
    font-size: 16px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .back-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .back-subtitle {
    font-size: 16px;
    color: var(--gold);
    font-style: italic;
    font-weight: 300;
  }

  .back-body {
    padding: 20px 28px 28px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .back-section-label {
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .back-definition {
    font-size: 18px;
    line-height: 1.75;
    color: var(--text);
    font-weight: 300;
  }

  .back-facts {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .back-fact {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 18px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .fact-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
    margin-top: 7px;
  }

  .back-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .meta-tag {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  .back-flip-back {
    position: absolute;
    bottom: 18px;
    right: 20px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .back-flip-back:hover { opacity: 1; }

  /* Close button */
  .modal-close {
    position: fixed;
    top: 24px;
    right: 28px;
    z-index: 200;
    background: rgba(30,30,30,0.9);
    border: 1px solid #333;
    color: var(--text);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }

  .modal-close:hover {
    background: var(--accent);
    border-color: transparent;
    transform: rotate(90deg);
  }

  /* Entrance animation */
  .flip-card {
    transform: scale(0.9) translateY(20px);
    transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1.000), opacity 0.4s;
    opacity: 0;
  }

  .modal-overlay.open .flip-card {
    transform: scale(1) translateY(0);
    opacity: 1;
    transition-delay: 0.05s;
  }

  /* Stagger grid items */
  .card-wrapper { animation: fadeUp 0.5s ease both; }
  .card-wrapper:nth-child(1) { animation-delay: 0.05s; }
  .card-wrapper:nth-child(2) { animation-delay: 0.10s; }
  .card-wrapper:nth-child(3) { animation-delay: 0.15s; }
  .card-wrapper:nth-child(4) { animation-delay: 0.20s; }
  .card-wrapper:nth-child(5) { animation-delay: 0.25s; }
  .card-wrapper:nth-child(6) { animation-delay: 0.30s; }
  .card-wrapper:nth-child(7) { animation-delay: 0.35s; }
  .card-wrapper:nth-child(8) { animation-delay: 0.40s; }
  .card-wrapper:nth-child(9) { animation-delay: 0.45s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 700px) {
    .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .card-number-face { padding: 28px 12px; }
    .card-big-number { font-size: 3.5rem; }
  }

  @media (max-width: 480px) {
    .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Коллекция знаний</div>
  <h1>Карточки</h1>
  <p>Выберите карточку, изучите изображение и переверните</p>
  <div class="header-line"></div>
</header>

<div class="grid-container">
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <button class="modal-close" id="modalClose">✕</button>
  <div class="flip-card" id="flipCard">
    <div class="flip-card-inner" id="flipCardInner">

      <!-- FRONT -->
      <div class="flip-front" id="flipFront" onclick="flipCard()">
        <div class="front-image-area">
          <img id="cardImage" src="" alt="Изображение карточки">
        </div>
        <div class="front-gradient"></div>
        <div class="front-top-badge">
          <span class="badge-number" id="frontNumber">№ 1</span>
        </div>
        <div class="front-bottom">
          <div class="front-category" id="frontCategory"></div>
          <div class="front-flip-hint">
            <span class="flip-icon">↺</span>
            Нажмите для переворота
          </div>
        </div>
      </div>

      <!-- BACK -->
      <div class="flip-back" onclick="flipCard()">
        <div class="back-header">
          <div class="back-number-label" id="backNumber">Карточка № 1</div>
          <div class="back-title" id="backTitle"></div>
          <div class="back-subtitle" id="backSubtitle"></div>
        </div>
        <div class="back-body">
          <div>
            <div class="back-section-label">Определение</div>
            <div class="back-definition" id="backDefinition"></div>
          </div>
          <div>
            <div class="back-section-label">Ключевые факты</div>
            <div class="back-facts" id="backFacts"></div>
          </div>
          <div class="back-meta" id="backMeta"></div>
        </div>
        <div class="back-flip-back">↩ нажмите для возврата</div>
      </div>

    </div>
  </div>
</div>

// ============================================================
// Генерация сетки
// ============================================================
const grid = document.getElementById('cardsGrid');

cards.forEach((card, i) => {
  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';
  wrapper.innerHTML = `
    <div class="card-selector" onclick="openCard(${i})">
      <div class="card-corner-decor"></div>
      <div class="card-corner-decor-bl"></div>
      <div class="card-number-face">
        <div class="card-ordinal">Карточка</div>
        <div class="card-big-number">${i + 1}</div>
        <div class="card-hint">Открыть</div>
      </div>
    </div>
  `;
  grid.appendChild(wrapper);
});

// ============================================================
// Логика модального окна и переворота
// ============================================================
let isFlipped = false;

function openCard(index) {
  const card = cards[index];
  isFlipped = false;
  document.getElementById('flipCard').classList.remove('flipped');

  // Fill front
  document.getElementById('cardImage').src = card.image;
  document.getElementById('frontNumber').textContent = `№ ${index + 1}`;
  document.getElementById('frontCategory').textContent = card.category;

  // Fill back
  document.getElementById('backNumber').textContent = `Карточка № ${index + 1}`;
  document.getElementById('backTitle').textContent = card.title;
  document.getElementById('backSubtitle').textContent = card.subtitle;
  document.getElementById('backDefinition').textContent = card.definition;

  const factsContainer = document.getElementById('backFacts');
  factsContainer.innerHTML = card.facts.map(f =>
    `<div class="back-fact"><div class="fact-dot"></div><span>${f}</span></div>`
  ).join('');

  const metaContainer = document.getElementById('backMeta');
  metaContainer.innerHTML = card.tags.map(t =>
    `<span class="meta-tag">${t}</span>`
  ).join('');

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flipCard').classList.toggle('flipped', isFlipped);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => {
    isFlipped = false;
    document.getElementById('flipCard').classList.remove('flipped');
  }, 400);
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
